<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>初めての記事</title>
  <style>
    :root {
      --bg: #f7f7f7;
      --card: #ffffff;
      --text: #222;
      --muted: #666;
      --line: #e5e5e5;
      --accent: #0a66c2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
    }

    .container {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 16px;
    }

    article {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 1.8rem;
    }

    p {
      margin: 0;
      font-size: 1rem;
    }

    .back-link {
      margin-top: 16px;
      display: inline-block;
      color: var(--accent);
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="container">
    <article>
      <h1>初めての記事</h1>
      <p>これはテスト投稿です。</p>
    </article>

    <a class="back-link" href="../index.html">← ブログ一覧に戻る</a>
  </main>
</body>
</html>
