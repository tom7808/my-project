<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ミニアプリ: ブログ</title>
  <style>
    :root {
      --bg: #f7f7f7;
      --card: #ffffff;
      --text: #222;
      --muted: #666;
      --line: #e5e5e5;
      --accent: #0a66c2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 16px;
    }

    header {
      margin-bottom: 28px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .post {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 14px;
    }

    .post h2 {
      margin: 0 0 4px;
      font-size: 1.2rem;
    }

    .meta {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .post p { margin: 0; }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <h1>ブログ</h1>
      <p class="subtitle">HTMLだけで作った、ミニマルなブログページ</p>
    </header>

    <article class="post">
      <h2>はじめての投稿</h2>
      <p class="meta">2026-04-11 · by Admin</p>
      <p>
        このページは、HTMLのみで構成したシンプルなブログのサンプルです。
        余計な機能を省き、読みやすさを重視した最小構成にしています。
      </p>
    </article>

    <article class="post">
      <h2>デザイン方針</h2>
      <p class="meta">2026-04-11 · by Admin</p>
      <p>
        余白・文字サイズ・境界線だけで情報の階層を表現しています。
        色数を抑え、静かで落ち着いた見た目にしました。
      </p>
    </article>

    <footer>
      <a href="../../index.html">← ホームに戻る</a>
    </footer>
  </main>
</body>
</html>
