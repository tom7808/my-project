<title>断食日時計</title>
<style>

  body.light {

    --glass-border: rgba(60,60,67,0.14);
    --glass-shadow: 0 18px 50px rgba(0,0,0,0.12);
    --select-bg: rgba(255,255,255,0.54);
    --select-border: rgba(60,60,67,0.13);
    --select-text: rgba(29,29,31,0.88);
    --option-bg: #fff;
    --fasting: #5856d6;

    --sun: #ffb000;

    --fasting-soft: rgba(88,86,214,0.16);

  body.dawn {
    --bg:
      radial-gradient(circle at 50% 12%, rgba(255,214,138,0.34), transparent 28%),

    --text: #fff8ef;
    --clock: #fffdf8;
    --secondary: rgba(255,248,239,0.62);
    --tertiary: rgba(255,248,239,0.50);
    --label: rgba(255,248,239,0.58);
    --glass-bg: rgba(255,255,255,0.13);

    --glass-border: rgba(255,255,255,0.18);
    --glass-shadow: 0 18px 54px rgba(28,18,44,0.28);
    --select-bg: rgba(255,255,255,0.14);

    --select-text: rgba(255,253,248,0.92);

  body.dusk {
    --bg:

      linear-gradient(180deg, #100f2f 0%, #38275f 46%, #c56751 100%);
    --text: #fff4ee;
    --clock: #fff9f4;
    --secondary: rgba(255,244,238,0.62);
    --tertiary: rgba(255,244,238,0.48);
    --label: rgba(255,244,238,0.56);
    --glass-bg: rgba(255,255,255,0.105);
    --glass-highlight: rgba(255,255,255,0.22);
    --glass-border: rgba(255,255,255,0.16);
    --glass-shadow: 0 18px 56px rgba(15,8,30,0.38);

  html {

  body {
    --app-height: 100dvh;

    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: var(--app-height);
    height: var(--app-height);
    padding: 36px 18px;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
    overflow: hidden;
    user-select: none;
    touch-action: manipulation;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    font-variant-numeric: tabular-nums;

  .wrap {
    position: relative;

  canvas {

  .sun {

    font-weight: 500;

    outline: none;
    cursor: pointer;
    -webkit-appearance: none;

    text-align: center;

    transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
  }
  select:focus-visible {

  select:active {

  select:disabled {

    .controls {
      width: 100%;
      margin-top: 0;

  @media (orientation: landscape) and (max-height: 360px) {

<body>

<div class="wrap">
  <canvas id="c" width="320" height="320"></canvas>
  <div class="sun">☀️</div>
  <div class="moon">🌙</div>
  <div class="info">
    <div class="clock" id="clock">--:--<sup>--</sup></div>
    <div class="date" id="date">----</div>

</div>

<div class="panel">
  <div class="controls">
    <div class="ctrl-group">
      <label>都市</label>
      <select id="cityS"></select>
    </div>
    <div class="ctrl-group">
      <label>断食時間</label>
      <select id="fastH">
        <option value="none">なし</option>
        <option value="12">12h</option>
        <option value="13">13h</option>

<div class="updated-at">更新: 2026-06-03 02:20 JST</div>

<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const W = 320, H = 320, CX = W/2, CY = H/2;
const R_OUTER = 146;
const R_INNER = 114;
const DEFAULTS = {
  city: 5,
  eatingStart: 12,
};
const PREFS = {
  city: 'fs_city',
  fastingHours: 'fs_fastH',
  eatingStart: 'fs_eatS',
  focus: 'fs_focus',
};
const els = {
  clock: document.getElementById('clock'),
  date: document.getElementById('date'),
  status: document.getElementById('status'),
  sunTimes: document.getElementById('sunTimes'),
  city: document.getElementById('cityS'),
  fastingHours: document.getElementById('fastH'),
  eatingStart: document.getElementById('eatS'),
  focus: document.getElementById('focusS'),
};

// ─── 日の出・日没計算 (Meeus算法) ───────────────────────
const CITIES = [
  { label: '根室',   lat: 43.3301, lon: 145.5828, tz: 9 },
  { label: '札幌',   lat: 43.0642, lon: 141.3469, tz: 9 },
  { label: '青森',   lat: 40.8221, lon: 140.7474, tz: 9 },
  { label: '仙台',   lat: 38.2682, lon: 140.8694, tz: 9 },
  { label: '新潟',   lat: 37.9162, lon: 139.0364, tz: 9 },
  { label: '東京',   lat: 35.6895, lon: 139.6917, tz: 9 },
  { label: '金沢',   lat: 36.5613, lon: 136.6562, tz: 9 },
  { label: '名古屋', lat: 35.1815, lon: 136.9066, tz: 9 },
  { label: '大阪',   lat: 34.6937, lon: 135.5023, tz: 9 },
  { label: '広島',   lat: 34.3853, lon: 132.4553, tz: 9 },
  { label: '高知',   lat: 33.5597, lon: 133.5311, tz: 9 },
  { label: '福岡',   lat: 33.5904, lon: 130.4017, tz: 9 },
  { label: '鹿児島', lat: 31.5966, lon: 130.5571, tz: 9 },
  { label: '那覇',   lat: 26.2124, lon: 127.6809, tz: 9 },
  { label: '石垣',   lat: 24.3407, lon: 124.1556, tz: 9 },
];

function getCity() {
  const idx = parseInt(els.city.value || DEFAULTS.city, 10);
  return CITIES[Math.min(Math.max(idx, 0), CITIES.length-1)];
}

function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

/**
 * 指定日の日の出・日没を計算
 * @param {Date} date
 * @param {number} lat  緯度
 * @param {number} lon  経度
 * @param {number} tz   タイムゾーンオフセット（時間）
 * @returns {{ rise: number, set: number }}  ローカル時間（小数時）
 */
function calcSunTimes(date, lat, lon, tz) {
  const rad = toRad;
  // date は「都市ローカル日」を UTC getter で読むための疑似 Date。
  // ブラウザ自身のタイムゾーンに影響されないようにする。
  const Y = date.getUTCFullYear();
  const M = date.getUTCMonth() + 1;
  const D = date.getUTCDate();
  const JD = 367*Y - Math.floor(7*(Y+Math.floor((M+9)/12))/4)
           + Math.floor(275*M/9) + D + 1721013.5;

  // 太陽の位置計算
  function sunPos(jd) {
    const n = jd - 2451545.0;
    const L = (280.460 + 0.9856474 * n) % 360;
    const g = rad((357.528 + 0.9856003 * n) % 360);
    const lambda = rad(L + 1.915 * Math.sin(g) + 0.020 * Math.sin(2*g));
    const eps = rad(23.439 - 0.0000004 * n);
    const sinDec = Math.sin(eps) * Math.sin(lambda);
    const dec = Math.asin(sinDec);
    const RA  = Math.atan2(Math.cos(eps)*Math.sin(lambda), Math.cos(lambda));
    // equation of time (hours)
    const Lrad = rad(L);
    const eot = (-1.915*Math.sin(g) - 0.020*Math.sin(2*g)
                 + 2.466*Math.sin(2*Lrad) - 0.053*Math.sin(4*Lrad)) / 60;
    return { dec, eot };
  }

  const { dec, eot } = sunPos(JD);

  // 時角
  const cosH = (Math.cos(rad(90.833)) - Math.sin(rad(lat))*Math.sin(dec))
             / (Math.cos(rad(lat)) * Math.cos(dec));

  if (cosH > 1)  return { rise: 0,  set: 0  }; // 極夜
  if (cosH < -1) return { rise: 0,  set: 24 }; // 白夜

  const H0 = toDeg(Math.acos(cosH)) / 15; // 時間単位

  // 太陽南中時刻（ローカル）
  const transit = 12 - eot - lon/15 + tz;

  return {
    rise: transit - H0,
    set:  transit + H0,
  };
}

// ─── 角度変換 ──────────────────────────────────────────
// 正午12:00=上(-π/2)、時計回り
function toAngle(h) {
  return ((h - 12) / 24) * Math.PI * 2 - Math.PI / 2;
}

function hmsToH(h, m, s) { return h + m/60 + s/3600; }

function angleToHour(angle) {
  return normHour(((angle + Math.PI / 2) / (Math.PI * 2)) * 24 + 12);
}

function pointToHour(clientX, clientY) {
  const rect = cv.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const x = (clientX - rect.left) * scaleX - CX;
  const y = (clientY - rect.top) * scaleY - CY;
  return {
    hour: Math.round(angleToHour(Math.atan2(y, x))) % 24,
    radius: Math.hypot(x, y),
  };
}

function lerpColor(c1, c2, t) {
  return {
    r: Math.round(c1.r + (c2.r - c1.r) * t),
    g: Math.round(c1.g + (c2.g - c1.g) * t),
    b: Math.round(c1.b + (c2.b - c1.b) * t),
  };
}
function hex(h) {
  return {
    r: parseInt(h.slice(0,2),16),
    g: parseInt(h.slice(2,4),16),
    b: parseInt(h.slice(4,6),16)
  };
}
function cssVar(name) {
  return getComputedStyle(document.body).getPropertyValue(name).trim();
}
function cssHex(name) {
  return hex(cssVar(name).replace('#', ''));
}

// a1→a2 時計回りカラーアーク
function drawColorArc(r, a1, a2, c1, c2, coreW, trackW) {
  let end = a2;
  while (end <= a1) end += Math.PI * 2;
  const steps = 80;
  const trackAlpha = Number(cssVar('--arc-track-alpha'));
  ctx.lineCap = 'round';
  for (let i = 0; i < steps; i++) {
    const t1 = i/steps, t2 = (i+1)/steps;
    const aa = a1 + (end-a1)*t1;
    const ab = a1 + (end-a1)*t2;
    const col = lerpColor(c1, c2, (t1+t2)/2);
    const cs = `rgb(${col.r},${col.g},${col.b})`;
    ctx.beginPath(); ctx.arc(CX, CY, r, aa, ab);
    ctx.strokeStyle = `rgba(${col.r},${col.g},${col.b},${trackAlpha})`;
    ctx.lineWidth = trackW; ctx.stroke();
    ctx.beginPath(); ctx.arc(CX, CY, r, aa, ab);
    ctx.strokeStyle = cs; ctx.lineWidth = coreW;
    ctx.stroke();
  }
}

// 外側：日時計リング（日の出〜日没を実際の時刻で）
function drawSundialRing(nowH, rise, set) {
  // ベースリング
  ctx.beginPath(); ctx.arc(CX, CY, R_OUTER, 0, Math.PI*2);
  ctx.strokeStyle = cssVar('--ring'); ctx.lineWidth = 2.5;
  ctx.stroke();

  // 夜側アーク（日没→翌日の出）
  drawColorArc(R_OUTER, toAngle(set), toAngle(rise + 24), cssHex('--moon'), cssHex('--moon-end'), 3, 9);

  // 昼側アーク（日の出→日没）
  drawColorArc(R_OUTER, toAngle(rise), toAngle(set), cssHex('--sun'), cssHex('--sun-end'), 3, 9);

  // 現在時刻の白い点
  const a = toAngle(nowH);
  const x = CX + R_OUTER * Math.cos(a);
  const y = CY + R_OUTER * Math.sin(a);
  ctx.beginPath(); ctx.arc(x, y, 5.5, 0, Math.PI*2);
  ctx.fillStyle = cssVar('--dot');
  ctx.fill();
}

function drawSoftArc(r, a1, a2, color, width) {
  let end = a2;
  while (end <= a1) end += Math.PI * 2;
  ctx.beginPath(); ctx.arc(CX, CY, r, a1, end);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.stroke();
}

// 内側：断食・食事ウィンドウ弧（固定）
function drawFastingArc(eatSH, fastH, focusMode) {
  const eatEH = eatSH + (24 - fastH);
  const eatStartA = toAngle(eatSH);
  const eatEndA = toAngle(eatEH);
  const fastingStartA = toAngle(eatEH);
  const fastingEndA = toAngle(eatSH + 24);

  if (focusMode === 'eating') {
    drawSoftArc(R_INNER, fastingStartA, fastingEndA, cssVar('--fasting-soft'), 5);
    drawColorArc(R_INNER, eatStartA, eatEndA, cssHex('--eating'), cssHex('--eating-end'), 5, 16);
    return;
  }

  drawSoftArc(R_INNER, eatStartA, eatEndA, cssVar('--eating-soft'), 5);
  drawColorArc(R_INNER, fastingStartA, fastingEndA, cssHex('--fasting'), cssHex('--fasting-end'), 5, 16);
}

function normHour(h) {
  return ((h % 24) + 24) % 24;
}

function hourDistance(a, b) {
  const diff = Math.abs(normHour(a) - normHour(b));
  return Math.min(diff, 24 - diff);
}

function isNearHour(nowH, targetH, windowH = 1.25) {
  return hourDistance(nowH, targetH) <= windowH;
}

function hourSpan(start, end) {
  return normHour(end - start);
}

function clampFastingHours(hours) {
  const allowed = [...els.fastingHours.options]
    .map(option => parseInt(option.value, 10))
    .filter(Number.isFinite);
  return allowed.reduce((nearest, value) => (
    Math.abs(value - hours) < Math.abs(nearest - hours) ? value : nearest
  ), allowed[0]);
}

function setFastingValues(eatingStart, fastingHours) {
  els.eatingStart.value = String(Math.round(normHour(eatingStart)) % 24);
  els.fastingHours.value = String(clampFastingHours(Math.round(fastingHours)));
  savePrefs();
  tick();
}

function fmt(h) {
  const totalMin = Math.round(normHour(h) * 60) % (24 * 60);
  const hh = Math.floor(totalMin / 60);
  const mm = totalMin % 60;
  return `${hh.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}`;
}

function fmtDate(date) {
  const year = date.getUTCFullYear();
  const month = date.getUTCMonth() + 1;
  const day = date.getUTCDate();
  const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
  return `令和${year - 2018}年 ${month}/${day} ${weekdays[date.getUTCDay()]}`;
}

function isWithinClockWindow(nowH, startH, endH) {
  const now = normHour(nowH);
  const start = normHour(startH);
  const end = normHour(endH);
  if (start === end) return true;
  if (start < end) return now >= start && now < end;
  return now >= start || now < end;
}

function cityLocalDateFromUTC(utcDate, tz) {
  // Date#getTime() は最初から UTC 基準の絶対時刻。
  // 都市の時差だけを足し、以後は getUTC* で読む。
  return new Date(utcDate.getTime() + tz * 3600000);
}

// キャッシュ（日付が変わったら再計算）
let cachedDate = null;
let cachedRise = 6;
let cachedSet  = 18;

function getSunTimes(date, city) {
  const key = `${date.getUTCFullYear()}-${date.getUTCMonth()}-${date.getUTCDate()}-${city.label}`;
  if (cachedDate !== key) {
    cachedDate = key;
    const t = calcSunTimes(date, city.lat, city.lon, city.tz);
    cachedRise = t.rise;
    cachedSet  = t.set;
  }
  return { rise: cachedRise, set: cachedSet };
}

function tick() {
  const nowUTC = new Date();
  const city   = getCity();

  // UTC基準で都市のローカル時刻を計算（ブラウザのtzに依存しない）
  const local = cityLocalDateFromUTC(nowUTC, city.tz);
  const hh = local.getUTCHours(), mm = local.getUTCMinutes(), ss = local.getUTCSeconds();

  const hasFastingWindow = els.fastingHours.value !== 'none';
  syncFastingControls(hasFastingWindow);
  const fastH = hasFastingWindow ? parseInt(els.fastingHours.value, 10) : 0;
  const eatSH = parseInt(els.eatingStart.value, 10);
  const focusMode = els.focus.value;
  const eatEH = eatSH + (24 - fastH);
  const nowH  = hmsToH(hh, mm, ss);
  const inEat = hasFastingWindow && isWithinClockWindow(nowH, eatSH, eatEH);

  const { rise, set } = getSunTimes(local, city);
  applySunTheme(nowH, rise, set);

  // テキスト
  els.clock.innerHTML =
    `${hh.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}<sup>${ss.toString().padStart(2,'0')}</sup>`;
  els.date.textContent = fmtDate(local);
  if (hasFastingWindow) {
    els.status.textContent = inEat ? '食事中' : '断食中';
    els.status.className = 'status ' + (inEat ? 'eating' : 'fasting');
  } else {
    els.status.textContent = '';
    els.status.className = 'status hidden';
  }
  els.sunTimes.textContent = `${city.label}  ☀ ${fmt(rise)}  ↓ ${fmt(set)}`;

  // 描画
  ctx.clearRect(0, 0, W, H);
  ctx.lineCap = 'round';
  if (hasFastingWindow) {
    drawFastingArc(eatSH, fastH, focusMode);
  }
  drawSundialRing(nowH, rise, set);
}

function syncFastingControls(hasFastingWindow = els.fastingHours.value !== 'none') {
  els.eatingStart.disabled = !hasFastingWindow;
  els.focus.disabled = !hasFastingWindow;
}

function appendOption(select, value, label, selected = false) {
  const opt = document.createElement('option');
  opt.value = value;
  opt.textContent = label;
  opt.selected = selected;
  select.appendChild(opt);
}

function buildCitySelect() {
  const savedRaw = parseInt(localStorage.getItem(PREFS.city) || DEFAULTS.city, 10);
  const saved = Math.min(Math.max(Number.isFinite(savedRaw) ? savedRaw : DEFAULTS.city, 0), CITIES.length - 1);
  CITIES.forEach((city, i) => appendOption(els.city, i, city.label, i === saved));
}

function buildEatingStartSelect() {
  for (let hour = 0; hour < 24; hour++) {
    appendOption(els.eatingStart, hour, `${hour}:00`, hour === DEFAULTS.eatingStart);
  }
}

// 保存・復元
function savePrefs() {
  localStorage.setItem(PREFS.fastingHours, els.fastingHours.value);
  localStorage.setItem(PREFS.eatingStart, els.eatingStart.value);
  localStorage.setItem(PREFS.city, els.city.value);
  localStorage.setItem(PREFS.focus, els.focus.value);
}
function applySunTheme(nowH, rise, set) {
  const previewTheme = new URLSearchParams(location.search).get('preview');
  if (previewTheme === 'dawn' || previewTheme === 'dusk') {
    document.body.classList.toggle('light', false);
    document.body.classList.toggle('dawn', previewTheme === 'dawn');
    document.body.classList.toggle('dusk', previewTheme === 'dusk');
    return;
  }

  const isDaylight = isWithinClockWindow(nowH, rise, set);
  const isDawn = isNearHour(nowH, rise);
  const isDusk = isNearHour(nowH, set);
  document.body.classList.toggle('light', isDaylight);
  document.body.classList.toggle('dawn', isDawn && !isDusk);
  document.body.classList.toggle('dusk', isDusk);
}
function loadPrefs() {
  const fh = localStorage.getItem(PREFS.fastingHours);
  const es = localStorage.getItem(PREFS.eatingStart);
  const focus = localStorage.getItem(PREFS.focus);
  if (fh) els.fastingHours.value = fh;
  if (es) els.eatingStart.value = es;
  if (focus) els.focus.value = focus;
  // city は buildCitySelect で処理済み
}

function onSettingChange(element, handler = tick) {
  element.addEventListener('change', () => {
    savePrefs();
    handler();
  });
}

let fastingDrag = null;

function getFastingDragTarget(hour, radius) {
  if (els.fastingHours.value === 'none') return null;
  if (Math.abs(radius - R_INNER) > 30) return null;

  const start = parseInt(els.eatingStart.value, 10);
  const fastingHours = parseInt(els.fastingHours.value, 10);
  const end = normHour(start + (24 - fastingHours));
  const startDist = hourDistance(hour, start);
  const endDist = hourDistance(hour, end);

  if (startDist <= 1.25 || endDist <= 1.25) {
    return startDist <= endDist ? 'start' : 'end';
  }
  return 'body';
}

function beginFastingDrag(clientX, clientY) {
  const point = pointToHour(clientX, clientY);
  const target = getFastingDragTarget(point.hour, point.radius);
  if (!target) return false;

  const start = parseInt(els.eatingStart.value, 10);
  const fastingHours = parseInt(els.fastingHours.value, 10);
  fastingDrag = {
    target,
    start,
    fastingHours,
    end: normHour(start + (24 - fastingHours)),
    offset: hourSpan(start, point.hour),
  };
  return true;
}

function moveFastingDrag(clientX, clientY) {
  if (!fastingDrag) return false;
  const { hour } = pointToHour(clientX, clientY);

  if (fastingDrag.target === 'body') {
    setFastingValues(hour - fastingDrag.offset, fastingDrag.fastingHours);
  } else if (fastingDrag.target === 'start') {
    const eatingHours = Math.max(4, Math.min(12, hourSpan(hour, fastingDrag.end)));
    setFastingValues(hour, 24 - eatingHours);
  } else if (fastingDrag.target === 'end') {
    const eatingHours = Math.max(4, Math.min(12, hourSpan(fastingDrag.start, hour)));
    setFastingValues(fastingDrag.start, 24 - eatingHours);
  }
  return true;
}

function setupFastingDrag() {
  if ('PointerEvent' in window) {
    cv.addEventListener('pointerdown', event => {
      if (!beginFastingDrag(event.clientX, event.clientY)) return;
      cv.setPointerCapture(event.pointerId);
      event.preventDefault();
    }, { passive: false });
    cv.addEventListener('pointermove', event => {
      if (moveFastingDrag(event.clientX, event.clientY)) event.preventDefault();
    }, { passive: false });
    cv.addEventListener('pointerup', () => { fastingDrag = null; });
    cv.addEventListener('pointercancel', () => { fastingDrag = null; });
  }

  cv.addEventListener('mousedown', event => {
    if (!beginFastingDrag(event.clientX, event.clientY)) return;
    event.preventDefault();
  }, { passive: false });
  document.addEventListener('mousemove', event => {
    if (moveFastingDrag(event.clientX, event.clientY)) event.preventDefault();
  }, { passive: false });
  document.addEventListener('mouseup', () => { fastingDrag = null; });

  cv.addEventListener('touchstart', event => {
    const touch = event.touches[0];
    if (!touch || !beginFastingDrag(touch.clientX, touch.clientY)) return;
    event.preventDefault();
  }, { passive: false });
  cv.addEventListener('touchmove', event => {
    const touch = event.touches[0];
    if (touch && moveFastingDrag(touch.clientX, touch.clientY)) event.preventDefault();
  }, { passive: false });
  cv.addEventListener('touchend', () => { fastingDrag = null; });
  cv.addEventListener('touchcancel', () => { fastingDrag = null; });
}

let wakeLock = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator) || document.visibilityState !== 'visible') return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => {
      wakeLock = null;
    });
  } catch (_) {
    wakeLock = null;
  }
}

function setupWakeLock() {
  requestWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      requestWakeLock();
    }
  });
}

function preventUserZoom() {
  document.addEventListener('gesturestart', event => event.preventDefault());
  document.addEventListener('gesturechange', event => event.preventDefault());
  document.addEventListener('gestureend', event => event.preventDefault());
  document.addEventListener('dblclick', event => event.preventDefault(), { passive: false });
}

function updateAppHeight() {
  const viewport = window.visualViewport;
  const height = viewport ? viewport.height : window.innerHeight;
  document.body.style.setProperty('--app-height', `${height}px`);
}

function scheduleViewportSizingRefresh() {
  updateAppHeight();
  requestAnimationFrame(updateAppHeight);
  setTimeout(updateAppHeight, 100);
  setTimeout(updateAppHeight, 300);
}

function setupViewportSizing() {
  scheduleViewportSizingRefresh();
  window.addEventListener('load', scheduleViewportSizingRefresh);
  window.addEventListener('resize', updateAppHeight);
  window.addEventListener('orientationchange', scheduleViewportSizingRefresh);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', updateAppHeight);
    window.visualViewport.addEventListener('scroll', updateAppHeight);
  }
}

setupViewportSizing();
buildCitySelect();
buildEatingStartSelect();
loadPrefs();
tick();
setupWakeLock();
setupFastingDrag();
preventUserZoom();
setInterval(tick, 1000);
onSettingChange(els.fastingHours);
onSettingChange(els.eatingStart);
onSettingChange(els.focus);
onSettingChange(els.city, () => {
  cachedDate = null;
  tick();
});
</script>
</body>
</html>
