<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GTD - タスク管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gtd-wrap">
        <main class="gtd-card">
            <header class="gtd-header">
                <h1 class="gtd-title">GTD タスク管理</h1>
                <button id="clear-done-btn" class="btn btn-quiet">完了を削除</button>
            </header>

            <form id="inbox-form" class="gtd-form">
                <input id="inbox-input" type="text" placeholder="気になることを入力...">
                <button type="submit" class="btn btn-primary">追加</button>
            </form>

            <nav id="tabs" class="tab-list no-scrollbar">
                <button class="tab-btn active" data-list="inbox">📥 インボックス</button>
                <button class="tab-btn" data-list="next">⚡ 次のアクション</button>
                <button class="tab-btn" data-list="project">📁 プロジェクト</button>
                <button class="tab-btn" data-list="waiting">⏳ 待ち中</button>
                <button class="tab-btn" data-list="someday">💭 いつか</button>
            </nav>

            <ul id="items-list" class="items-list"></ul>

            <div id="empty-state" class="empty-state hidden">
                <p>このリストは空です</p>
            </div>
        </main>
    </div>

    <div id="move-modal" class="modal hidden">
        <div class="modal-card">
            <h2>移動先を選択</h2>
            <button class="move-option" data-target="inbox">📥 インボックス</button>
            <button class="move-option" data-target="next">⚡ 次のアクション</button>
            <button class="move-option" data-target="project">📁 プロジェクト</button>
            <button class="move-option" data-target="waiting">⏳ 待ち中</button>
            <button class="move-option" data-target="someday">💭 いつか</button>
            <button id="move-cancel" class="btn btn-quiet btn-block">キャンセル</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
