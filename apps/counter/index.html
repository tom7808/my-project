<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counter App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="counter-wrap">
        <section class="counter-card" aria-label="Counter app">
            <h1 class="counter-title">Counter</h1>
            <p id="count" class="counter-value" aria-live="polite">0</p>

            <div class="counter-actions">
                <button id="decrement" class="btn" aria-label="decrement">−</button>
                <button id="increment" class="btn btn-primary" aria-label="increment">+</button>
            </div>

            <button id="reset" class="btn btn-reset">Reset</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
