<!doctype html>
<html lang="ja">
<meta charset="utf-8">
<title>今日の一言ニュース</title>
<style>
  body{margin:0;background:#07111f;display:grid;place-items:center;height:100vh}
  canvas{width:min(100vw,100vh);height:min(100vw,100vh);background:#0b1d33}
  button{position:fixed;bottom:24px;font-size:18px;padding:12px 18px;border-radius:999px}
</style>

<canvas id="c" width="1024" height="1024"></canvas>
<button onclick="speak()">ニュースを読む</button>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const news = {
  title: "今日の一言ニュース",
  body: "北日本沖で強い地震。津波警報は出ていません。",
  sub: "落ち着いて、最新情報を確認しましょう。"
};

function speak(){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(
    news.title + "。 " + news.body + " " + news.sub
  );
  u.lang = "ja-JP";
  u.rate = 0.95;
  u.pitch = 1.05;
  speechSynthesis.speak(u);
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawCaster(t){
  ctx.save();
  ctx.translate(512,455 + Math.sin(t*2)*6);

  ctx.fillStyle="rgba(0,0,0,.28)";
  ctx.beginPath();
  ctx.ellipse(0,250,230,38,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#203a5f";
  ctx.strokeStyle="#102033";
  ctx.lineWidth=10;
  roundRect(-145,60,290,230,38);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle="#f2c18f";
  ctx.beginPath();
  ctx.arc(0,-30,92,0,Math.PI*2);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle="#2a1d18";
  ctx.beginPath();
  ctx.arc(0,-62,98,Math.PI,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#111827";
  ctx.beginPath();
  ctx.arc(-34,-28,7,0,Math.PI*2);
  ctx.arc(34,-28,7,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle="#111827";
  ctx.lineWidth=5;
  ctx.beginPath();
  ctx.arc(0,10,28,0.15,Math.PI-0.15);
  ctx.stroke();

  ctx.fillStyle="#ffffff";
  ctx.beginPath();
  ctx.moveTo(-58,78);
  ctx.lineTo(0,145);
  ctx.lineTo(58,78);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle="#e53935";
  ctx.beginPath();
  ctx.moveTo(0,145);
  ctx.lineTo(-24,88);
  ctx.lineTo(24,88);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function draw(t){
  ctx.clearRect(0,0,1024,1024);

  const g = ctx.createLinearGradient(0,0,0,1024);
  g.addColorStop(0,"#123b68");
  g.addColorStop(1,"#07111f");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,1024,1024);

  ctx.fillStyle="#ffffff";
  ctx.font="800 58px system-ui";
  ctx.textAlign="center";
  ctx.fillText(news.title,512,110);

  drawCaster(t);

  ctx.fillStyle="#f7fbff";
  ctx.strokeStyle="#1b2b44";
  ctx.lineWidth=10;
  roundRect(112,700,800,170,34);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle="#1b2b44";
  ctx.font="700 38px system-ui";
  wrapText(news.body,512,760,700,48);

  ctx.fillStyle="#48627f";
  ctx.font="500 26px system-ui";
  wrapText(news.sub,512,830,720,34);

  ctx.fillStyle="#ffd84d";
  ctx.font="800 30px system-ui";
  ctx.fillText("TAP BUTTON TO SPEAK",512,930);

  requestAnimationFrame(ms => draw(ms/1000));
}

function wrapText(text,x,y,maxWidth,lineHeight){
  let line = "";
  const lines = [];
  for(const ch of text){
    const test = line + ch;
    if(ctx.measureText(test).width > maxWidth && line){
      lines.push(line);
      line = ch;
    } else line = test;
  }
  lines.push(line);
  lines.forEach((l,i)=>ctx.fillText(l,x,y+i*lineHeight));
}

requestAnimationFrame(ms => draw(ms/1000));
</script>
</html>
